# Orchestrate API and optional MLflow server

version: '3.8'

services:
  # The api service builds from the Dockerfile and runs the FastAPI inference server.
  # Use this service to run the production-ready API.
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount ./models as a volume so the .pt file can be swapped without rebuilding the container
      - ./models:/app/models
    environment:
      # Set the path to the best model to use
      - MODEL_PATH=/app/models/best_lstm.pt

  # The mlflow service runs the MLflow tracking server.
  # Use this service to view training metrics, parameters, and models logged during training.
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.0
    ports:
      - "5000:5000"
    volumes:
      # Mount ./mlruns to persist MLflow data locally
      - ./mlruns:/mlflow/mlruns
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow/mlruns/mlflow.db --default-artifact-root /mlflow/mlruns
